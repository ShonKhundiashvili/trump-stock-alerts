name: daily-equity-scan

# Daily technical screener over the S&P 500 + Nasdaq-100 → Daily Scan topic.
# Research only, not financial advice.
#
# Runs in the cloud (Mac-independent) Mon-Fri at 13:30 UTC (= 16:30 IDT, ~US
# open). GitHub cron is best-effort and can be delayed, which is fine for a
# once-daily scan. Also triggerable manually from the Actions tab.
on:
  schedule:
    - cron: "30 13 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: daily-scan
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Share the same state DB as the poll workflow so the performance
      # scorecard can read past alerts and store their price outcomes.
      - name: Restore state DB
        uses: actions/cache/restore@v4
        with:
          path: alerts.db
          key: alerts-db-${{ github.run_id }}
          restore-keys: |
            alerts-db-

      - name: Run daily scan + performance refresh
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ACCOUNT_SIZE: ${{ vars.ACCOUNT_SIZE }}
          RISK_PCT: ${{ vars.RISK_PCT }}
          DATABASE_PATH: alerts.db
          LOG_LEVEL: INFO
        run: python main.py --scan

      # Persist the DB (now with fresh price outcomes) back to the shared cache.
      - name: Save state DB
        if: always()
        uses: actions/cache/save@v4
        with:
          path: alerts.db
          key: alerts-db-${{ github.run_id }}
